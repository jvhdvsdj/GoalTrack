{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'CSS/main.css' %}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <title>Document</title>
</head>
<body> 
    <nav class="nav-extended blue accent-2">
            <div class="nav-wrapper">
                <a href="#" class="brand-logo">GoalTrack</a>
                <a href="#side-out" data-target="side-out" class="sidenav-trigger"><i class="material-icons">menu</i></a> 
                <ul class="right">
                        <li><span class="white-text" style="line-height:64px; padding: 0 12px;">{{ user.username }}</span></li>
                        <li><a class="white-text" href="{% url 'register' %}">Реєстрація</a></li>
                </ul>
            </div>
        </nav>
 
        <ul id="side-out" class="sidenav sidenav-fixed">
            <li><a href="#">Головна</a></li>
            <li><a href="/">Завдання</a></li>
            <li><a href="/habits">Звички</a></li>
            <li><a href="#">Статистика</a></li>
        </ul>
 
        <main style="margin-left: 300px;">
            {% block content %}
            {% endblock %}
        </main>
 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script> 
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            M.Collapsible.init(document.querySelectorAll('.collapsible'));
            M.Sidenav.init(document.querySelectorAll('.sidenav')); 
        });
    </script>
   
</body>
</html>
