{% extends "base.html" %}

    {% block content %} 
        <style>
            table, th, td{
                border: 1px solid black;
                border-collapse: collapse;
            }

            input[type="checkbox"]{
                width:20px;
                height:20px;
                position:relative;
                z-index: 999;
            
            }
            label{
                display: block;
                width: 100%;
                height: 100%;
                cursor: pointer;
            }

            td, th{
                text-align: center;
            }
        </style>

        <div>
            <table cellpadding="10">
                <thead>
                    <tr style="background-color: #d6d6d6;">
                        <th>Звичка</th>
                        <th>Понеділок</th>
                        <th>Вівторок</th>
                        <th>Середа</th>
                        <th>Четвер</th>
                        <th>П'ятниця</th>
                        <th>Субота</th>
                        <th>Неділя</th>
                        <th>Всього днів</th>
                    </tr>
                </thead>
                <tbody>
                    {% for habit in habits %}
                    <tr>
                        <td>
                            {{ habit.name }}
                            <label>
                                Прогрес:  
                                <progress id="progress-{{ forloop.counter0 }}" max="7" value="0"></progress>
                                <span id="label-{{ forloop.counter0 }}">0/7</span>
                            </label>
                        
                        </td>
                        {% for day in "1234567" %}
                        <td>
                            <label>
                                <input type="checkbox" class="habit-check" data-row="{{ forloop.parentloop.counter0 }}">    
                                <span></span>                              
                            </label>
                        </td>
                        {% endfor %}
                        <td id="total-{{ forloop.counter0 }}" data-total="0">0</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>                  
        </div>
        <script>
            document.querySelectorAll('.habit-check').forEach(checkbox =>{
                checkbox.addEventListener('change', function (){
                    const row = this.dataset.row;
                    const checkboxes = document.querySelectorAll(`.habit-check[data-row="${row}"]`);
                    const checked = [...checkboxes].filter(cb => cb.checked).length;

                    document.getElementById(`progress-${row}`).value = checked;
                    document.getElementById(`label-${row}`).textContent = `${checked}/7`;

                    const total = document.getElementById(`total-${row}`);
                    total.textContent = parseInt(total.dataset.total) + (this.checked ? 1 : -1);
                    total.dataset.total = total.textContent;
                });
            });
        </script>
    {% endblock %}
