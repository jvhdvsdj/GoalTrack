{% extends "base.html" %}
{% block content %}
        <div class="row">
            <div class="col s12 m4">
                <div class="card blue-grey darken-1">
                    <div class="card-content white-text">
                        <span class="card-title">Це якась задача</span>
                        <p>Це короткий опис</p>
                    </div>
                    <div class="card-action">
                        <a id="delete-btn" class="btn-floating red"><i class="material_icons">insert_chart</i></a>
                        <a id="done-btn" class="btn-floating green"><i class="material_icons">add</i></a>
                    </div>
                </div>
            </div>
        </div>
        <div id="made_task">
            <a class="btn-small">Додати завдання</a>
        </div>
        <footer id="task_footer" class="page-footer blue accent-4">
            <div class="container">
                <div class="row">
                    <div class="col s5">
                        <h4>{{ task.title }}</h4>
                    </div>
                    <div class="col offset-s4 s3 ">
                        <h5 id="time-left" data-time="{{ seconds_left }}"></h5>
                    </div>
                </div>
            </div>
            <script>
                const timerElement = document.getElementById("time-left");
                const format = (num) => num.toString().padStart(2, '0');
                if (timerElement && timerElement.dataset.time) {
                    let timeLeft = parseInt(document.getElementById("time-left").dataset.time);

                    function updateTimer() {
                        if (timeLeft <= 0) {
                        document.getElementById("time-left").innerText = "Час вийшов";
                        return;
                        }

                        let days = Math.floor(timeLeft / 86400);
                        let hours = Math.floor((timeLeft / 86400) / 3600);
                        let minutes = Math.floor((timeLeft % 3600) / 60);
                        let seconds = timeLeft % 60;

                        document.getElementById("time-left").innerText =
                        days + "д " + format(hours) + ":" + format(minutes) + ":" + format(seconds);

                        timeLeft--; 
                    }
                
                    updateTimer();          
                    setInterval(updateTimer, 1000); 
                }
            </script>
        </footer>
{% endblock %}
